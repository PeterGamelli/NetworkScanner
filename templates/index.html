{% extends "base.html" %}

{% block head %}
  <title>Network Scanner</title>
{% endblock %}

{% block body %}
  <h1 id="title">Network Scanner</h1>

  <h3>
    Your IP Address:
    <span id="local_ip">Loading...</span>
  </h3>

  <form>
    <input type="text" id="ip-input" placeholder="192.168.1.1">
    <button type="button" onclick="sendIpInput()">Submit</button>
  </form>

  <p id="ip-results">Results will appear here.</p>

  <script src="/static/app.js" defer></script>
{% endblock %}
